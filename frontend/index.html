<!-- pokegrade homepage -->
<!-- entry point, links to regrade and snipe pages -->
<!-- bottom section pulls seeded cards from /api/cards/suggested -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PokéGrade</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- shared header / nav, repeated on subpages -->
  <header>
    <h1>PokéGrade</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="pages/regrade.html">Regrade</a>
      <a href="pages/snipe.html">Snipe</a>
    </nav>
  </header>

  <main>
    <!-- hero pitch + cta buttons to main features -->
    <section class="hero">
      <h2>Find Hidden Gem PSA 9s</h2>
      <p>Analyze Pokémon cards for their PSA 10 regrade potential and discover undervalued listings.</p>
      <div class="cta-buttons">
        <a href="pages/regrade.html" class="btn btn-primary">Regrade a Card</a>
        <a href="pages/snipe.html" class="btn btn-secondary">Snipe Cards</a>
      </div>
    </section>

    <!-- suggested cards section -->
    <!-- populated below by inline script, renders into #cards-container -->
    <section class="suggested-cards">
      <h2>Top Regrade Opportunities</h2>
      <p>Cards with the biggest price jump from PSA 9 to PSA 10</p>
      <div id="cards-container" class="cards-grid">
        <p>Loading suggested cards...</p>
      </div>
    </section>
  </main>

  <script>
    // fetches suggested cards on page load
    // renders each as anchor that deep-links to regrade page with cert pre-filled
    fetch('/api/cards/suggested')
      .then(res => res.json())
      .then(({ data }) => {
        const container = document.getElementById('cards-container');
        // empty-state guard for fresh installs without seed data
        if (!data || !data.length) {
          container.innerHTML = '<p>No suggested cards yet.</p>';
          return;
        }
        // each card is anchor not div, click navigates to regrade?cert=X
        // onerror hides broken images instead of showing alt text box
        container.innerHTML = data.map(card => `
          <a class="card card-link" href="pages/regrade.html?cert=${encodeURIComponent(card.certNumber)}">
            ${card.imageUrl ? `<img class="card-image" src="${card.imageUrl}" alt="${card.name}" onerror="this.style.display='none'"/>` : ''}
            <h3>${card.name}</h3>
            <p class="set">${card.set} · #${card.number}</p>
            <div class="prices">
              <span class="psa9">PSA 9: $${card.psa9Price.toLocaleString()}</span>
              <span class="arrow">→</span>
              <span class="psa10">PSA 10: $${card.psa10Price.toLocaleString()}</span>
            </div>
            <p class="diff">+$${(card.psa10Price - card.psa9Price).toLocaleString()} potential upside</p>
          </a>
        `).join('');
      })
      .catch(() => {
        // network or json error, server likely down
        document.getElementById('cards-container').innerHTML = '<p>Could not load cards. Is the server running?</p>';
      });
  </script>
</body>
</html>
